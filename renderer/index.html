<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta
    http-equiv="Content-Security-Policy"
    content="default-src 'self'; style-src 'self' 'unsafe-inline'; font-src 'self'; script-src 'self'"
  />
  <title>Super Bash</title>

  <!-- xterm.js v4 — UMD builds from node_modules (loaded before terminal.js) -->
  <link rel="stylesheet" href="../node_modules/xterm/css/xterm.css" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <!-- ── Custom titlebar (frameless window) ──────────────────────────── -->
  <div id="titlebar">
    <div id="app-title">Super Bash</div>
    <div id="window-controls">
      <button id="btn-settings"       title="Settings (Ctrl+,)">&#x2699;</button>
      <button id="btn-help"          title="Help — feature reference">&#x3F;</button>
      <button id="btn-sync-snippets" title="Sync team snippets">&#x21BB;</button>
      <button id="btn-broadcast"     title="Broadcast mode (Ctrl+Shift+B)">&#x229B;</button>
      <button id="btn-minimize"      title="Minimize">&#x2212;</button>
      <button id="btn-maximize"      title="Maximize">&#x25A1;</button>
      <button id="btn-close"         title="Close">&#x2715;</button>
    </div>
  </div>

  <!-- ── Tab bar ────────────────────────────────────────────────────── -->
  <div id="tab-bar">
    <div id="tabs-list">
      <!-- Tab buttons injected by terminal.js -->
    </div>
    <button id="btn-new-tab" title="New tab (Ctrl+T)">+</button>
  </div>

  <!-- ── Tab content area ───────────────────────────────────────────── -->
  <div id="tabs-content">
    <!-- Per-tab split-pane containers injected by terminal.js -->
  </div>

  <!-- ── Git status bar ───────────────────────────────────────────── -->
  <div id="git-bar" class="git-no-repo">
    <div id="git-bar-left">
      <span id="git-branch" title="View git log">
        <span id="git-branch-icon">⎇</span>
        <span id="git-branch-name"></span>
      </span>
      <span id="git-dirty">
        <span id="git-dirty-dot">●</span>
        <span id="git-dirty-count"></span>
      </span>
      <span id="git-ahead-behind"></span>
    </div>
    <div id="git-bar-right">
      <button class="git-bar-btn" id="git-btn-fetch" title="git fetch">fetch</button>
      <button class="git-bar-btn" id="git-btn-pull"  title="git pull">pull</button>
      <button class="git-bar-btn" id="git-btn-push"  title="git push">push</button>
    </div>
  </div>

  <!-- ── Command palette ───────────────────────────────────────────── -->
  <div id="palette-overlay" class="hidden">
    <div id="palette-modal">
      <div id="palette-search-row">
        <span id="palette-prompt">&gt;</span>
        <input
          id="palette-input"
          type="text"
          placeholder="Search aliases, snippets, history…"
          autocomplete="off"
          spellcheck="false"
        />
      </div>
      <div id="palette-list">
        <!-- Items rendered by terminal.js -->
      </div>
      <div id="palette-footer">
        <span class="palette-hint">&#x2191;&#x2193;&nbsp;navigate</span>
        <span class="palette-hint">&#x23CE;&nbsp;run</span>
        <span class="palette-hint">Esc&nbsp;close</span>
      </div>
    </div>
  </div>

  <!-- xterm.js UMD scripts — order matters: core first, then addons -->
  <script src="../node_modules/xterm/lib/xterm.js"></script>
  <script src="../node_modules/xterm-addon-fit/lib/xterm-addon-fit.js"></script>
  <script src="../node_modules/xterm-addon-web-links/lib/xterm-addon-web-links.js"></script>
  <script src="../node_modules/xterm-addon-search/lib/xterm-addon-search.js"></script>
  <script src="../node_modules/xterm-addon-webgl/lib/xterm-addon-webgl.js"></script>

  <!-- ── Settings panel ───────────────────────────────────────────────── -->
  <div id="settings-overlay" class="hidden">
    <div id="settings-modal">
      <div id="settings-header">
        <span id="settings-title">Settings</span>
        <button id="settings-close" title="Close (Esc)">&#x2715;</button>
      </div>
      <div id="settings-body">

        <label class="settings-row">
          <span class="settings-label">Font Size</span>
          <div class="settings-control settings-font-size-row">
            <input type="range" id="settings-font-size" min="8" max="32" step="1" />
            <span id="settings-font-size-val">14</span>
          </div>
        </label>

        <label class="settings-row">
          <span class="settings-label">Font Family</span>
          <input type="text" class="settings-text-input" id="settings-font-family"
            placeholder='"JetBrains Mono", "Courier New", monospace' />
        </label>

        <label class="settings-row">
          <span class="settings-label">Shell Path</span>
          <input type="text" class="settings-text-input" id="settings-shell-path"
            placeholder="C:/Program Files/Git/bin/bash.exe" />
        </label>

        <label class="settings-row">
          <span class="settings-label">Default Opacity</span>
          <select class="settings-select" id="settings-opacity">
            <option value="0">100% — fully opaque</option>
            <option value="1">85% — slightly transparent</option>
            <option value="2">70% — see-through</option>
          </select>
        </label>

        <label class="settings-row settings-row-toggle">
          <span class="settings-label">Restore Session</span>
          <input type="checkbox" id="settings-restore-session" />
        </label>

      </div>
      <div id="settings-footer">
        <span class="settings-hint">Changes applied immediately · saved to <code>~/.superbash/personal.json</code></span>
        <button id="settings-save" class="settings-btn-save">Save</button>
      </div>
    </div>
  </div>

  <!-- ── Right-click context menu ─────────────────────────────────────── -->
  <div id="context-menu" class="hidden">
    <div class="ctx-item" id="ctx-copy">Copy</div>
    <div class="ctx-item" id="ctx-paste">Paste</div>
    <div class="ctx-sep"></div>
    <div class="ctx-item" id="ctx-clear">Clear</div>
  </div>

  <!-- ── Toast notifications ──────────────────────────────────────────── -->
  <div id="toast-container"></div>

  <script src="terminal.js"></script>
</body>
</html>
